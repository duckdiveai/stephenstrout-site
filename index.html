<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stephen Strout | Film Editor & Producer</title>
    <meta
      name="description"
      content="Portfolio website for Los Angeles film editor and producer Stephen Strout, featuring profile, projects, and contact information."
    />
    <meta
      name="keywords"
      content="Stephen Strout, film editor, producer, Los Angeles editor, documentary editor, projects"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Stephen Strout | Film Editor & Producer" />
    <meta
      property="og:description"
      content="Profile, projects, and contact for Los Angeles film editor and producer Stephen Strout."
    />
    <meta property="og:image" content="/public/portfolio/social-share-placeholder.svg" />
    <meta property="og:url" content="https://stephenstrout.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260415c" />
    <style>
      .profile-hero-visual {
        position: relative;
      }
      .video-audio-controls {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.4);
        padding: 8px 14px;
        border-radius: 24px;
        backdrop-filter: blur(6px);
      }
      .mute-btn {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        opacity: 0.85;
        transition: opacity 0.2s;
      }
      .mute-btn:hover {
        opacity: 1;
      }
      .volume-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 80px;
        height: 3px;
        background: rgba(255, 255, 255, 0.45);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      .volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: white;
        cursor: pointer;
      }
      .volume-slider::-moz-range-thumb {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: white;
        cursor: pointer;
        border: none;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="#profile" aria-label="Go to profile">
        <span class="brand-mark">
          <img src="/public/portfolio/Sdouble.png" alt="Stephen Strout" />
        </span>
      </a>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span>Menu</span>
      </button>

      <nav id="site-nav" class="site-nav" aria-label="Primary">
        <a href="#projects">DOCUMENTARY</a>
        <a href="#projects">FILM</a>
        <a href="#profile">PROFILE</a>
        <a href="#contact">CONNECT</a>
      </nav>
    </header>

    <main id="main-content">
      <section id="profile" class="section profile-hero">
        <div class="profile-hero-visual reveal">
          <video
            id="hero-video"
            class="profile-hero-video"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
            aria-label="Stephen Strout showreel background video"
          >
            <source src="/public/portfolio/video/Ss.com_Trailer_280526_.mp4" type="video/mp4" />
          </video>
          <div class="video-audio-controls">
            <button id="mute-btn" class="mute-btn" aria-label="Unmute video">
              <svg id="icon-muted" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
              </svg>
              <svg id="icon-sound" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              </svg>
            </button>
            <input id="volume-slider" type="range" min="0" max="1" step="0.05" value="1" class="volume-slider" aria-label="Volume control" />
          </div>
        </div>
        <div class="profile-hero-title reveal">
          <h1 id="profile-title"></h1>
        </div>
      </section>

      <section class="section profile-body">
        <div class="profile-body-flow">
          <div id="profile-paragraphs" class="profile-paragraphs reveal"></div>
          <div class="profile-panel reveal">
            <div class="acclaim-layout">
              <div class="acclaim-copy">
                <p class="eyebrow">Critical Acclaim</p>
                <p id="recognition-text" class="sidebar-copy"></p>
              </div>
              <aside class="acclaim-media">
                <figure class="acclaim-portrait">
                  <img
                    id="profile-photo"
                    src="/public/portfolio/stills/Stephen-Strout-Editor-Producer.png"
                    alt="Stephen Strout portrait"
                  />
                </figure>
                <div class="acclaim-actions">
                  <a id="profile-imdb-link" class="imdb-link" href="#" aria-label="IMDb Profile" title="IMDb Profile">
                    <span class="imdb-link-mark" aria-hidden="true">IMDb</span>
                  </a>
                  <a id="profile-cv-link" class="imdb-link cv-link" href="#" download>
                    <span class="imdb-link-mark" aria-hidden="true">CV</span>
                  </a>
                </div>
              </aside>
            </div>
          </div>
        </div>
      </section>

      <section id="projects" class="section projects-section">
        <div class="projects-page-head reveal">
          <h2>Projects</h2>
          <p id="projects-intro" class="section-intro"></p>
        </div>

        <div id="projects-list" class="projects-list"></div>
      </section>

      <section id="contact" class="section contact-section">
        <div class="contact-card reveal">
          <h2 id="contact-heading"></h2>
          <div class="contact-actions">
            <a id="email-link" class="button contact-cta" href="#">Say Hello</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <figure class="site-footer-image">
        <img src="/public/portfolio/stills/PETE_and_Ss_cutting_In_NYC_bottom.png" alt="Stephen Strout editing in New York" />
      </figure>
    </footer>

    <script type="module" src="scripts/app.js?v=20260415f"></script>
    <script>
      (function () {
        var video = document.getElementById('hero-video');
        var muteBtn = document.getElementById('mute-btn');
        var iconMuted = document.getElementById('icon-muted');
        var iconSound = document.getElementById('icon-sound');
        var slider = document.getElementById('volume-slider');

        muteBtn.addEventListener('click', function () {
          video.muted = !video.muted;
          iconMuted.style.display = video.muted ? 'block' : 'none';
          iconSound.style.display = video.muted ? 'none' : 'block';
          if (!video.muted) {
            video.volume = parseFloat(slider.value);
          }
        });

        slider.addEventListener('input', function () {
          var val = parseFloat(slider.value);
          video.volume = val;
          if (val === 0) {
            video.muted = true;
            iconMuted.style.display = 'block';
            iconSound.style.display = 'none';
          } else if (video.muted) {
            video.muted = false;
            iconMuted.style.display = 'none';
            iconSound.style.display = 'block';
          }
        });
      })();
    </script>
  </body>
</html>
